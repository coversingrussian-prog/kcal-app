<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>КалорияСкан</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #12130F;
    --surface: #1C1E17;
    --surface-2: #23261D;
    --line: #333829;
    --lime: #C7F04A;
    --lime-dim: #9BC22F;
    --text: #EDEFE4;
    --text-dim: #9AA088;
    --carb: #F0B24A;
    --prot: #4AB8F0;
    --fat: #F06A4A;
    --radius: 20px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .wrap { flex: 1; display: flex; flex-direction: column; padding: 20px; max-width: 480px; margin: 0 auto; width: 100%; }

  /* Header */
  header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .logo-dot { width: 34px; height: 34px; border-radius: 10px; background: var(--lime); display: grid; place-items: center; }
  .logo-dot svg { width: 20px; height: 20px; }
  h1 { font-size: 19px; font-weight: 700; letter-spacing: -0.02em; }
  .subtitle { color: var(--text-dim); font-size: 13px; margin-bottom: 24px; padding-left: 44px; margin-top: -4px; }

  /* Upload zone */
  .drop {
    background: var(--surface);
    border: 1.5px dashed var(--line);
    border-radius: var(--radius);
    aspect-ratio: 4/3;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; cursor: pointer; transition: border-color .2s, background .2s;
    position: relative; overflow: hidden;
  }
  .drop:active { background: var(--surface-2); }
  .drop.has-image { border-style: solid; border-color: var(--lime-dim); }
  .drop img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .drop-icon { width: 52px; height: 52px; border-radius: 50%; background: var(--surface-2); display: grid; place-items: center; }
  .drop-icon svg { width: 26px; height: 26px; stroke: var(--lime); }
  .drop-text { color: var(--text-dim); font-size: 14px; font-weight: 500; }
  .drop-hint { color: var(--line); font-size: 12px; margin-top: -8px; }

  /* CTA */
  .cta {
    margin-top: 16px; width: 100%; padding: 17px; border: none; border-radius: 16px;
    background: var(--lime); color: #12130F; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: transform .1s, opacity .2s; letter-spacing: -0.01em;
  }
  .cta:active { transform: scale(0.98); }
  .cta:disabled { opacity: 0.35; cursor: default; }

  /* Loading */
  .loading { display: none; flex-direction: column; align-items: center; gap: 16px; padding: 40px 0; }
  .loading.show { display: flex; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--line); border-top-color: var(--lime); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: var(--text-dim); font-size: 14px; }

  /* Result */
  .result { display: none; margin-top: 20px; animation: rise .4s ease; }
  .result.show { display: block; }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .dish-name { font-size: 15px; color: var(--text-dim); margin-bottom: 4px; }
  .kcal-card {
    background: linear-gradient(160deg, var(--surface-2), var(--surface));
    border: 1px solid var(--line); border-radius: var(--radius);
    padding: 24px; text-align: center; margin-bottom: 14px;
  }
  .kcal-big { font-size: 56px; font-weight: 800; line-height: 1; letter-spacing: -0.04em; color: var(--lime); }
  .kcal-unit { font-size: 15px; color: var(--text-dim); font-weight: 600; margin-top: 6px; }
  .kcal-note { font-size: 12px; color: var(--line); margin-top: 10px; }

  .macros { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .macro {
    background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px 10px; text-align: center;
  }
  .macro-val { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .macro-label { font-size: 11px; color: var(--text-dim); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.03em; }
  .macro.c .macro-val { color: var(--carb); }
  .macro.p .macro-val { color: var(--prot); }
  .macro.f .macro-val { color: var(--fat); }

  /* Ad slot */
  .ad-slot {
    margin-top: 16px; background: var(--surface); border: 1px solid var(--line);
    border-radius: 14px; padding: 16px; display: flex; align-items: center; gap: 12px;
    cursor: pointer;
  }
  .ad-badge { font-size: 9px; color: var(--line); border: 1px solid var(--line); padding: 2px 5px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; align-self: flex-start; }
  .ad-body { flex: 1; }
  .ad-title { font-size: 14px; font-weight: 600; }
  .ad-desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  .again {
    margin-top: 16px; width: 100%; padding: 14px; border: 1px solid var(--line);
    border-radius: 14px; background: transparent; color: var(--text); font-size: 14px;
    font-weight: 600; cursor: pointer;
  }
  .again:active { background: var(--surface); }

  /* Error */
  .error { display: none; margin-top: 16px; background: rgba(240,106,74,0.1); border: 1px solid #F06A4A55; border-radius: 14px; padding: 14px; }
  .error.show { display: block; }
  .error p { color: #F0A08A; font-size: 13px; }

  footer { text-align: center; padding: 16px; color: var(--line); font-size: 11px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo-dot">
      <svg viewBox="0 0 24 24" fill="none" stroke="#12130F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 2v10l7-7"/>
      </svg>
    </div>
    <h1>КалорияСкан</h1>
  </header>
  <p class="subtitle">Сфоткай блюдо — узнай калории</p>

  <!-- Input state -->
  <div id="inputState">
    <label class="drop" id="drop">
      <input type="file" id="fileInput" accept="image/*" capture="environment" hidden>
      <div id="dropPlaceholder" style="display:flex;flex-direction:column;align-items:center;gap:14px;">
        <div class="drop-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </div>
        <span class="drop-text">Нажми, чтобы сфотографировать</span>
        <span class="drop-hint">или выбрать из галереи</span>
      </div>
    </label>
    <button class="cta" id="analyzeBtn" disabled>Посчитать калории</button>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Распознаём блюдо…</p>
  </div>

  <!-- Result -->
  <div class="result" id="result">
    <p class="dish-name" id="dishName">Блюдо</p>
    <div class="kcal-card">
      <div class="kcal-big" id="kcalValue">0</div>
      <div class="kcal-unit">ккал (примерно)</div>
      <div class="kcal-note">Оценка по фото · погрешность ±20%</div>
    </div>
    <div class="macros">
      <div class="macro p"><div class="macro-val" id="protVal">0г</div><div class="macro-label">Белки</div></div>
      <div class="macro f"><div class="macro-val" id="fatVal">0г</div><div class="macro-label">Жиры</div></div>
      <div class="macro c"><div class="macro-val" id="carbVal">0г</div><div class="macro-label">Углеводы</div></div>
    </div>

    <!-- Рекламный слот -->
    <div class="ad-slot" id="adSlot">
      <span class="ad-badge">Реклама</span>
      <div class="ad-body">
        <div class="ad-title" id="adTitle">Здесь твоя реклама</div>
        <div class="ad-desc" id="adDesc">Место под рекламодателя</div>
      </div>
    </div>

    <button class="again" id="againBtn">Сканировать ещё</button>
  </div>

  <!-- Error -->
  <div class="error" id="error"><p id="errorText"></p></div>
</div>

<footer>Оценка носит справочный характер · не является медицинской рекомендацией</footer>

<script>
  // ==== Telegram init ====
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  // ==== ВАЖНО: сюда вставишь адрес своей бэкенд-функции ====
  // После деплоя на Netlify это будет что-то вроде:
  // "https://ТВОЙ-САЙТ.netlify.app/.netlify/functions/analyze"
  const API_URL = "/.netlify/functions/analyze";

  // ==== Элементы ====
  const fileInput = document.getElementById('fileInput');
  const drop = document.getElementById('drop');
  const dropPlaceholder = document.getElementById('dropPlaceholder');
  const analyzeBtn = document.getElementById('analyzeBtn');
  const inputState = document.getElementById('inputState');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  const errorBox = document.getElementById('error');
  const errorText = document.getElementById('errorText');

  let imageBase64 = null;

  // ==== Загрузка фото ====
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      imageBase64 = ev.target.result;
      // Превью
      drop.classList.add('has-image');
      dropPlaceholder.style.display = 'none';
      const existing = drop.querySelector('img.preview');
      if (existing) existing.remove();
      const img = document.createElement('img');
      img.src = imageBase64;
      img.className = 'preview';
      drop.appendChild(img);
      analyzeBtn.disabled = false;
    };
    reader.readAsDataURL(file);
  });

  // ==== Анализ ====
  analyzeBtn.addEventListener('click', async () => {
    if (!imageBase64) return;
    inputState.style.display = 'none';
    errorBox.classList.remove('show');
    loading.classList.add('show');

    try {
      const base64Data = imageBase64.split(',')[1];
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: base64Data })
      });

      if (!res.ok) throw new Error('Сервер вернул ошибку ' + res.status);
      const data = await res.json();

      // Заполняем результат
      document.getElementById('dishName').textContent = data.dish || 'Блюдо';
      document.getElementById('kcalValue').textContent = data.calories ?? '—';
      document.getElementById('protVal').textContent = (data.protein ?? '—') + 'г';
      document.getElementById('fatVal').textContent = (data.fat ?? '—') + 'г';
      document.getElementById('carbVal').textContent = (data.carbs ?? '—') + 'г';

      loading.classList.remove('show');
      result.classList.add('show');
    } catch (err) {
      loading.classList.remove('show');
      inputState.style.display = 'block';
      errorText.textContent = 'Не получилось распознать. Проверь связь и попробуй ещё раз. (' + err.message + ')';
      errorBox.classList.add('show');
    }
  });

  // ==== Сканировать ещё ====
  document.getElementById('againBtn').addEventListener('click', () => {
    imageBase64 = null;
    fileInput.value = '';
    result.classList.remove('show');
    drop.classList.remove('has-image');
    const existing = drop.querySelector('img.preview');
    if (existing) existing.remove();
    dropPlaceholder.style.display = 'flex';
    analyzeBtn.disabled = true;
    inputState.style.display = 'block';
  });
</script>
</body>
</html>
